<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Display Case</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --surface2: #eeece7;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18; --text-muted: #6b6960; --text-faint: #a8a49c;
    --btn-hover: #eeece7; --danger: #c0392b; --danger-bg: #fdf0ee;
    --legacy-bg: #fef3dc; --legacy-border: #c98a1a; --legacy-text: #7a4f00;
    --new-bg: #e6f1fb; --new-border: #378add; --new-text: #0c447c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --surface: #1e1d1a; --surface2: #28271f;
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
      --text: #f0ede6; --text-muted: #9e9a91; --text-faint: #5c5a54;
      --btn-hover: #28271f; --danger: #e05c4a; --danger-bg: #2a1410;
      --legacy-bg: #2e2206; --legacy-border: #c98a1a; --legacy-text: #f5c96a;
      --new-bg: #042c53; --new-border: #378add; --new-text: #b5d4f4;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    height: 100dvh;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden; display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
    text-transform: uppercase;
  }

  /* ── Header ── */
  .app-header {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .app-title {
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
    letter-spacing: 0.12em; color: var(--text-faint);
  }
  .header-btns { display: flex; align-items: center; gap: 6px; }
  .hdr-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    letter-spacing: 0.06em; padding: 6px 12px; border-radius: 7px;
    border: 1px solid var(--border-strong); background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .hdr-btn:active { background: var(--btn-hover); }
  .hdr-btn.danger { border-color: var(--danger); color: var(--danger); }
  .hdr-btn.danger:active { background: var(--danger-bg); }
  .hdr-btn.sort-active { background: var(--new-bg); color: var(--new-text); border-color: var(--new-border); }

  /* ── Sub-tabs ── */
  .subtabs {
    flex-shrink: 0;
    display: flex; gap: 6px; padding: 8px 14px;
    background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .subtab {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    letter-spacing: 0.06em; padding: 6px 12px; border-radius: 8px;
    border: 1px solid var(--border-strong); background: transparent;
    color: var(--text-faint); cursor: pointer; transition: all 0.15s;
  }
  .subtab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── Search + add ── */
  .searchadd {
    flex-shrink: 0;
    display: flex; gap: 8px; align-items: center;
    padding: 6px 12px;
  }
  .searchadd-input {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 8px 12px; border-radius: 10px;
    border: 1px solid var(--border-strong);
    background: var(--surface); color: var(--text);
    outline: none; text-transform: uppercase;
  }
  .searchadd-input:focus { border-color: var(--new-border); }
  .searchadd-input::placeholder { color: var(--text-faint); opacity: 0.6; font-size: 13px; }
  .add-btn {
    padding: 10px 18px; border-radius: 10px;
    border: none; background: var(--text); color: var(--bg);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .add-btn:active { opacity: 0.8; transform: scale(0.97); }

  /* ── List ── */
  .list-wrap {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 14px 14px;
    display: flex; flex-direction: column; gap: 0;
    min-height: 0;
  }

  .dc-list {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .dc-empty-msg {
    padding: 2.5rem; text-align: center;
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--text-faint); letter-spacing: 0.08em;
  }

  /* Each row */
  .dc-row {
    display: flex; align-items: stretch;
    min-height: 48px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .dc-row:last-child { border-bottom: none; }
  .dc-row.is-legacy { background: var(--legacy-bg); }
  .dc-row.is-new    { background: var(--new-bg); }

  /* Type pill */
  .dc-type-pill {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    letter-spacing: 0.05em; min-width: 60px; padding: 0 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface2); color: var(--text-faint);
    transition: all 0.15s; user-select: none;
  }
  .dc-row.is-legacy .dc-type-pill { background: var(--legacy-bg); color: var(--legacy-text); border-right-color: var(--legacy-border); }
  .dc-row.is-new    .dc-type-pill { background: var(--new-bg);    color: var(--new-text);    border-right-color: var(--new-border); }

  /* Name */
  .dc-name-inp {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    background: transparent; border: none; outline: none;
    color: var(--text); padding: 0 10px; text-transform: uppercase;
  }
  .dc-name-inp::placeholder { color: var(--text-faint); opacity: 0.5; font-weight: 400; }

  /* Cost basis — blue */
  .dc-cost-box {
    display: none; align-items: center; gap: 3px;
    background: #b5d4f4; border-left: 1px solid var(--new-border);
    padding: 0 8px; flex-shrink: 0;
  }
  @media (prefers-color-scheme: dark) { .dc-cost-box { background: #0c447c; } }
  .dc-row.is-new .dc-cost-box { display: flex; }
  .dc-cost-pfx { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--new-text); opacity: 0.7; }
  .dc-cost-inp {
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    color: var(--new-text); background: transparent; border: none; outline: none;
    width: 52px; text-align: right;
  }
  .dc-cost-inp::placeholder { color: var(--new-text); opacity: 0.35; }
  .dc-cost-inp::-webkit-outer-spin-button,
  .dc-cost-inp::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Sale price — red */
  .dc-sale-box {
    display: flex; align-items: center; gap: 3px;
    background: var(--danger-bg); border-left: 1px solid var(--danger);
    padding: 0 8px; flex-shrink: 0;
  }
  .dc-sale-pfx { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--danger); opacity: 0.7; }
  .dc-sale-inp {
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    color: var(--danger); background: transparent; border: none; outline: none;
    width: 52px; text-align: right;
  }
  .dc-sale-inp::placeholder { color: var(--danger); opacity: 0.35; }
  .dc-sale-inp::-webkit-outer-spin-button,
  .dc-sale-inp::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* SOLD button */
  .dc-sold-btn {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 0.05em; padding: 0 10px; flex-shrink: 0;
    border: none; border-left: 1px solid #16a34a;
    background: #16a34a; color: #fff; cursor: pointer;
  }
  .dc-sold-btn:active { opacity: 0.8; }
  .dc-sold-btn:disabled { opacity: 0.4; pointer-events: none; }

  /* Remove */
  .dc-remove-btn {
    font-size: 14px; padding: 0 10px;
    border: none; border-left: 1px solid var(--border);
    background: transparent; color: var(--text-faint);
    cursor: pointer; flex-shrink: 0;
  }
  .dc-remove-btn:active { color: var(--danger); background: var(--danger-bg); }

  /* Sold history */
  .sold-list {
    display: none; flex-direction: column;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .sold-list.visible { display: flex; }

  .sold-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; min-height: 52px;
    border-bottom: 1px solid var(--border);
  }
  .sold-row:last-child { border-bottom: none; }
  .sold-row.is-legacy { background: var(--legacy-bg); }
  .sold-row.is-new    { background: var(--new-bg); }

  .sold-badge {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    letter-spacing: 0.05em; padding: 3px 8px; border-radius: 5px;
    background: var(--surface2); color: var(--text-muted);
    border: 1px solid var(--border-strong); flex-shrink: 0;
  }
  .sold-row.is-legacy .sold-badge { background: var(--legacy-bg); color: var(--legacy-text); border-color: var(--legacy-border); }
  .sold-row.is-new    .sold-badge { background: var(--new-bg);    color: var(--new-text);    border-color: var(--new-border); }

  .sold-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); }
  .sold-sale { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--danger); flex-shrink: 0; }
  .sold-cost { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--new-text); flex-shrink: 0; }
  .sold-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-faint); flex-shrink: 0; }
  .undo-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    padding: 5px 10px; border-radius: 6px;
    border: 1px solid var(--danger); color: var(--danger);
    background: var(--danger-bg); cursor: pointer; flex-shrink: 0;
  }
  .undo-btn:active { opacity: 0.8; }
  .rem-btn {
    font-size: 13px; padding: 4px 8px;
    border: none; background: none; color: var(--text-faint);
    cursor: pointer; border-radius: 5px; flex-shrink: 0;
  }
  .rem-btn:active { color: var(--danger); background: var(--danger-bg); }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <span class="app-title">Display Case</span>
  <div class="header-btns">
    <button class="hdr-btn" id="sort-btn" onclick="toggleSort()">A–Z</button>
    <button class="hdr-btn" onclick="saveJSON()">Save</button>
    <button class="hdr-btn" onclick="document.getElementById('load-input').click()">Load</button>
    <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadJSON(event)">
    <button class="hdr-btn danger" onclick="clearAll()">Clear</button>
  </div>
</div>

<!-- Sub-tabs -->
<div class="subtabs">
  <button class="subtab active" id="tab-inventory" onclick="switchTab('inventory')">Inventory <span id="inv-count">(0)</span></button>
  <button class="subtab"        id="tab-sold"      onclick="switchTab('sold')">Sold <span id="sold-count">(0)</span></button>
</div>

<!-- Search + add (inventory only) -->
<div class="searchadd" id="searchadd">
  <input class="searchadd-input" id="search-input" type="text"
    placeholder="Search or add card…" maxlength="60"
    oninput="render()"
    onkeydown="if(event.key==='Enter'){addCard();event.preventDefault();}">
  <button class="add-btn" onclick="addCard()">+ Add</button>
</div>

<!-- List area -->
<div class="list-wrap">
  <div class="dc-list" id="dc-list"></div>
  <div class="sold-list" id="sold-list"></div>
</div>

<script>
  const LS_KEY = 'tcg_iphone_display';
  let cards = { inventory: [], sold: [] };
  let idCounter = 0;
  let currentTab = 'inventory';
  let sortAlpha = false;

  function save() { try { localStorage.setItem(LS_KEY, JSON.stringify({cards, idCounter})); } catch(e) {} }
  function load() {
    try {
      const r = localStorage.getItem(LS_KEY);
      if(!r) return;
      const d = JSON.parse(r);
      cards = d.cards || { inventory: [], sold: [] };
      idCounter = d.idCounter || 0;
    } catch(e) {}
  }

  function updateCounts() {
    document.getElementById('inv-count').textContent  = '('+cards.inventory.length+')';
    document.getElementById('sold-count').textContent = '('+cards.sold.length+')';
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-inventory').classList.toggle('active', tab==='inventory');
    document.getElementById('tab-sold').classList.toggle('active', tab==='sold');
    document.getElementById('searchadd').style.display = tab==='inventory' ? '' : 'none';
    document.getElementById('dc-list').style.display = tab==='inventory' ? '' : 'none';
    const sl = document.getElementById('sold-list');
    if(tab==='sold') { sl.classList.add('visible'); renderSold(); }
    else { sl.classList.remove('visible'); }
    if(tab==='inventory') render();
  }

  function toggleSort() {
    sortAlpha = !sortAlpha;
    document.getElementById('sort-btn').classList.toggle('sort-active', sortAlpha);
    render();
  }

  function addCard() {
    const inp = document.getElementById('search-input');
    const n = inp.value.trim(); if(!n) return;
    cards.inventory.push({ id: ++idCounter, name: n, type: 0, cost: '', salePrice: '' });
    inp.value = '';
    render(); updateCounts(); save();
  }

  function render() {
    const list = document.getElementById('dc-list'); if(!list) return;
    const q = (document.getElementById('search-input').value||'').trim().toLowerCase();
    // Clear rows, keep empty msg
    Array.from(list.children).forEach(c => { if(c.id !== 'dc-empty') list.removeChild(c); });
    let emptyMsg = document.getElementById('dc-empty');
    if(!emptyMsg) { emptyMsg = document.createElement('div'); emptyMsg.className='dc-empty-msg'; emptyMsg.id='dc-empty'; list.appendChild(emptyMsg); }
    let filtered = cards.inventory.filter(c => !q || (c.name||'').toLowerCase().includes(q));
    if(sortAlpha) filtered = [...filtered].sort((a,b) => (a.name||'').localeCompare(b.name||''));
    if(!filtered.length) { emptyMsg.style.display=''; emptyMsg.textContent = q ? 'NO MATCHES.' : 'NO CARDS YET. ADD ONE ABOVE.'; return; }
    emptyMsg.style.display = 'none';
    filtered.forEach(card => list.insertBefore(buildRow(card), emptyMsg));
  }

  function buildRow(card) {
    const row = document.createElement('div');
    row.className = 'dc-row' + (card.type===1?' is-legacy':card.type===2?' is-new':'');

    // Type pill
    const pill = document.createElement('div'); pill.className = 'dc-type-pill';
    pill.textContent = card.type===1?'LEGACY':card.type===2?'NEW':'—';
    pill.onclick = () => {
      card.type = (card.type+1)%3;
      if(card.type===0) card.cost='';
      row.className = 'dc-row'+(card.type===1?' is-legacy':card.type===2?' is-new':'');
      pill.textContent = card.type===1?'LEGACY':card.type===2?'NEW':'—';
      costBox.style.display = card.type===2?'flex':'none';
      save();
    };
    row.appendChild(pill);

    // Name
    const nameInp = document.createElement('input');
    nameInp.className='dc-name-inp'; nameInp.type='text';
    nameInp.value=card.name; nameInp.placeholder='Card name…';
    nameInp.onchange=()=>{ card.name=nameInp.value; save(); };
    row.appendChild(nameInp);

    // Cost (new only)
    const costBox = document.createElement('div'); costBox.className='dc-cost-box';
    costBox.style.display = card.type===2?'flex':'none';
    const cPfx=document.createElement('span'); cPfx.className='dc-cost-pfx'; cPfx.textContent='$';
    const cInp=document.createElement('input'); cInp.className='dc-cost-inp'; cInp.type='text'; cInp.inputMode='decimal';
    cInp.placeholder='0.00'; cInp.value=card.cost||'';
    cInp.oninput=()=>{ card.cost=cInp.value; save(); };
    costBox.appendChild(cPfx); costBox.appendChild(cInp); row.appendChild(costBox);

    // Sale price (red)
    const saleBox=document.createElement('div'); saleBox.className='dc-sale-box';
    const sPfx=document.createElement('span'); sPfx.className='dc-sale-pfx'; sPfx.textContent='$';
    const sInp=document.createElement('input'); sInp.className='dc-sale-inp'; sInp.type='text'; sInp.inputMode='decimal';
    sInp.placeholder='0.00'; sInp.value=card.salePrice||'';
    sInp.oninput=()=>{ card.salePrice=sInp.value; };
    saleBox.appendChild(sPfx); saleBox.appendChild(sInp); row.appendChild(saleBox);

    // SOLD
    const soldBtn=document.createElement('button'); soldBtn.className='dc-sold-btn'; soldBtn.textContent='SOLD';
    soldBtn.onclick=()=>{
      if(soldBtn.disabled) return; soldBtn.disabled=true;
      const si=row.querySelector('.dc-sale-inp'); if(si) card.salePrice=si.value;
      const ci=row.querySelector('.dc-cost-inp'); if(ci) card.cost=ci.value;
      card.soldAt=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      cards.inventory=cards.inventory.filter(c=>c.id!==card.id);
      cards.sold.unshift(card);
      if(row.parentNode) row.parentNode.removeChild(row);
      const list=document.getElementById('dc-list');
      if(list&&!cards.inventory.length){const em=document.getElementById('dc-empty');if(em)em.style.display='';}
      updateCounts(); save();
    };
    row.appendChild(soldBtn);

    // Remove
    const remBtn=document.createElement('button'); remBtn.className='dc-remove-btn'; remBtn.textContent='✕';
    remBtn.onclick=()=>{
      cards.inventory=cards.inventory.filter(c=>c.id!==card.id);
      if(row.parentNode) row.parentNode.removeChild(row);
      if(!cards.inventory.length){const em=document.getElementById('dc-empty');if(em)em.style.display='';}
      updateCounts(); save();
    };
    row.appendChild(remBtn);
    return row;
  }

  function renderSold() {
    const list=document.getElementById('sold-list'); if(!list) return;
    list.innerHTML='';
    if(!cards.sold.length){const e=document.createElement('div');e.className='dc-empty-msg';e.textContent='NO DISPLAY SALES YET.';list.appendChild(e);return;}
    cards.sold.forEach(card=>{
      const row=document.createElement('div');
      row.className='sold-row'+(card.type===1?' is-legacy':card.type===2?' is-new':'');
      const badge=document.createElement('span'); badge.className='sold-badge';
      badge.textContent=card.type===1?'LEGACY':card.type===2?'NEW':'—';
      const name=document.createElement('span'); name.className='sold-name'; name.textContent=card.name||'UNNAMED';
      row.appendChild(badge); row.appendChild(name);
      if(card.salePrice&&parseFloat(card.salePrice)>0){const s=document.createElement('span');s.className='sold-sale';s.textContent='$'+parseFloat(card.salePrice).toFixed(2);row.appendChild(s);}
      if(card.type===2&&card.cost&&parseFloat(card.cost)>0){const c=document.createElement('span');c.className='sold-cost';c.textContent='cost $'+parseFloat(card.cost).toFixed(2);row.appendChild(c);}
      const ts=document.createElement('span');ts.className='sold-time';ts.textContent=card.soldAt||'';row.appendChild(ts);
      const undoBtn=document.createElement('button');undoBtn.className='undo-btn';undoBtn.textContent='UNDO';
      undoBtn.onclick=()=>{cards.sold=cards.sold.filter(c=>c.id!==card.id);delete card.soldAt;cards.inventory.unshift(card);renderSold();updateCounts();save();if(currentTab==='inventory')render();};
      row.appendChild(undoBtn);
      const rem=document.createElement('button');rem.className='rem-btn';rem.textContent='✕';
      rem.onclick=()=>{cards.sold=cards.sold.filter(c=>c.id!==card.id);renderSold();updateCounts();save();};
      row.appendChild(rem);
      list.appendChild(row);
    });
  }

  function clearAll() {
    if(!confirm('CLEAR ALL DISPLAY CASE DATA? THIS CANNOT BE UNDONE.')) return;
    cards={inventory:[],sold:[]}; idCounter=0;
    try{localStorage.removeItem(LS_KEY);}catch(e){}
    render(); renderSold(); updateCounts(); switchTab('inventory');
  }

  function saveJSON() {
    const blob=new Blob([JSON.stringify({cards,idCounter},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='display_case.json';a.click();URL.revokeObjectURL(a.href);
  }

  function loadJSON(event) {
    const file=event.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{try{const d=JSON.parse(e.target.result);cards=d.cards||{inventory:[],sold:[]};idCounter=d.idCounter||0;render();renderSold();updateCounts();save();}catch{alert('Could not read that file.');}};
    reader.readAsText(file);event.target.value='';
  }

  load(); render(); updateCounts();
</script>
</body>
</html>
